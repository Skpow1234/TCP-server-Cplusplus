name: clang-tidy

on:
  push:
  pull_request:

jobs:
  clang-tidy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build
          # Pair clang-18 with clang-tidy-18 so analyzer and compiler share a frontend.
          sudo apt-get install -y clang-18 clang-tidy-18 || sudo apt-get install -y clang clang-tidy
          # We need a libstdc++ that actually ships C++23 <expected> and <jthread>.
          # libstdc++-14 is reliable; fall back to 13/12 if 14 is not available on the runner.
          sudo apt-get install -y libstdc++-14-dev g++-14 \
            || sudo apt-get install -y libstdc++-13-dev g++-13 \
            || sudo apt-get install -y libstdc++-12-dev g++-12

      - name: Configure and build (clang-tidy-ci preset)
        working-directory: ${{ github.workspace }}
        run: |
          # Build with clang++ so compile_commands.json is clang-native; clang-tidy replays the exact flags.
          if command -v clang++-18 >/dev/null 2>&1; then CI_CXX=clang++-18
          elif command -v clang++ >/dev/null 2>&1; then CI_CXX=clang++
          else echo "clang++ is required for the clang-tidy CI job"; exit 1; fi

          # Pick the newest libstdc++ actually installed on the runner.
          STDLIB_VER=""
          for ver in 14 13 12; do
            if [ -d "/usr/include/c++/${ver}" ]; then STDLIB_VER="${ver}"; break; fi
          done
          if [ -z "${STDLIB_VER}" ]; then
            echo "libstdc++ >= 12 headers not found under /usr/include/c++"; exit 1
          fi
          ARCH_TRIPLE="x86_64-linux-gnu"

          # Point clang at libstdc++ ${STDLIB_VER} explicitly so <expected>/<jthread> resolve
          # regardless of which libstdc++ clang-18 would otherwise default to on this runner.
          # Also bump __cpp_concepts: clang-18 reports 201907L, but libstdc++-14's <expected>
          # header gates on __cpp_concepts >= 202002L, so without this std::expected is not declared.
          STDLIB_FLAGS="-nostdinc++ \
            -isystem/usr/include/c++/${STDLIB_VER} \
            -isystem/usr/include/${ARCH_TRIPLE}/c++/${STDLIB_VER} \
            -isystem/usr/include/c++/${STDLIB_VER}/backward \
            -D__cpp_concepts=202002L \
            -Wno-builtin-macro-redefined"

          cmake --preset clang-tidy-ci \
            -D CMAKE_CXX_COMPILER="$CI_CXX" \
            -D CMAKE_CXX_FLAGS="${STDLIB_FLAGS}"
          cmake --build --preset clang-tidy-ci --parallel

      - name: clang-tidy gate
        working-directory: ${{ github.workspace }}
        run: cmake --build "${{ github.workspace }}/out/build/clang-tidy-ci" --target clang-tidy
