name: clang-tidy

on:
  push:
  pull_request:

jobs:
  clang-tidy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build
          # Prefer a modern clang-tidy when available (needed for --query-driver and newer C++ support).
          sudo apt-get install -y clang-tidy-18 || sudo apt-get install -y clang-tidy
          sudo apt-get install -y g++-14 || sudo apt-get install -y g++-12

      - name: Configure and build (clang-tidy-ci preset)
        working-directory: ${{ github.workspace }}
        run: |
          # Clang on Ubuntu often links against an older libstdc++ that lacks C++23 std::expected.
          # Build with a recent g++ so compile_commands.json uses a complete standard library; clang-tidy still analyzes the same sources.
          if command -v g++-14 >/dev/null 2>&1; then CI_CXX=g++-14
          elif command -v g++-13 >/dev/null 2>&1; then CI_CXX=g++-13
          elif command -v g++-12 >/dev/null 2>&1; then CI_CXX=g++-12
          else echo "Install g++-12 or newer for C++23 std::expected"; exit 1; fi
          # clang-tidy runs clang under the hood and needs help finding the *same* libstdc++ headers
          # as the compiler used to generate compile_commands.json.
          GCC_VER="$("/usr/bin/$CI_CXX" -dumpversion | cut -d. -f1)"
          GCC_TRIPLE="$("/usr/bin/$CI_CXX" -dumpmachine)"
          cmake --preset clang-tidy-ci \
            -D CMAKE_CXX_COMPILER="$CI_CXX" \
            -D TCP_SERVER_CLANG_TIDY_EXTRA_ARGS="--gcc-toolchain=/usr;-isystem/usr/include/c++/${GCC_VER};-isystem/usr/include/${GCC_TRIPLE}/c++/${GCC_VER};-isystem/usr/lib/gcc/${GCC_TRIPLE}/${GCC_VER}/include;-isystem/usr/lib/gcc/${GCC_TRIPLE}/${GCC_VER}/include-fixed"
          cmake --build --preset clang-tidy-ci --parallel

      - name: clang-tidy gate
        working-directory: ${{ github.workspace }}
        run: cmake --build "${{ github.workspace }}/out/build/clang-tidy-ci" --target clang-tidy
